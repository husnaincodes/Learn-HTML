<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
     
        <link rel="stylesheet" href="grid.css">
         <title>Bootstrap Dashboard</title>
    </head>
    <body>

        <div class="container">
            <nav class="navbar navbar-expand-lg navbar-dark px-3">
                <a class="navbar-brand" href="#">Dashboard</a>

                <div class="ms-auto">
                    <button class="btn btn-primary btn-sm">Home</button>
                    <button class="btn btn-secondary btn-sm">Profile</button>
                    <button class="btn btn-dark btn-sm">Alerts</button>
                </div>
                
            </nav>
             <div class="container mt-4">
                <div class="welcome-box text-center p-4 rounded">
                    <h2>Welcome to Your Dashboard</h2>
                    <p>An interactive Bootstrap demo page.</p>
                </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="bg-info text-white p-3">Column 1</div>
                </div>
                <div class="col-md-4">
                    <div class="bg-warning text-white p-3">Column 2</div>
                </div>
                <div class="col-md-4">
                    <div class="bg-danger text-white p-3">Column 3</div>
                </div>
                
            </div>

        </div>
        <div class="row mt-4">
                <div class="col-md-4">
                    <div class="form-box">
                        <h5>Contact Form</h5>

                        <input class="form-control mb-2" placeholder="Name">
                        <input class="form-control mb-3" placeholder="Email">

                        <button class="btn btn-success w-100">Submit</button>

                        <div class="alert alert-success mt-3 text-center">
                            Success! Form submitted!
                        </div>
                    </div>
                </div>

    </body>
</html>
