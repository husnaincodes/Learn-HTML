<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex and Grid Example</title>

    <style>
        /* ===== PAGE LAYOUT USING GRID ===== */
        .container {
            display: grid;
            grid-template-areas:
                "header header"
                "sidebar main"
                "footer footer";
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            min-height: 100vh;
        }

        header {
            grid-area: header;
            background: black;
            color: white;
            padding: 20px;
        }

        aside {
            grid-area: sidebar;
            background: rgb(49, 176, 207);
            padding: 20px;
        }

        main {
            grid-area: main;
            padding: 20px;
        }

        footer {
            grid-area: footer;
            background: rgb(94, 49, 49);
            color: white;
            text-align: center;
            padding: 10px;
            font-size: large;
            font-weight: bold;
        }

        /* ===== FLEXBOX FOR NAVBAR ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
        }

        /* ===== FLEXBOX FOR CARDS ===== */
        .card-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .card {
            background: lightblue;
            padding: 20px;
            flex: 1 1 200px;
        }

        /* ===== RESPONSIVE DESIGN ===== */
        @media (max-width: 768px) {
            .container {
                grid-template-areas:
                    "header"
                    "main"
                    "sidebar"
                    "footer";
                grid-template-columns: 1fr;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <header>
        <div class="navbar">
            <h2>My Website</h2>
            <div class="nav-links">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </div>
        </div>
    </header>

    <aside>
        <h3>Sidebar</h3>
        <p>This is sidebar content.</p>
    </aside>

    <main>
        <h2>Main Content</h2>

        <div class="card-container">
            <div class="card">Card 1</div>
            <div class="card">Card 2</div>
            <div class="card">Card 3</div>
        </div>

    </main>

    <footer>
        <p>© 2026 All Rights Reserved</p>
    </footer>

</div>

</body>
</html>
